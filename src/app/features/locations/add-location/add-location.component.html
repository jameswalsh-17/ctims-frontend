<div class="page-container">
  <div class="form-card">
    <h2>Add Farm Location</h2>
    <p>Register a new farm site, land parcel, or facility.</p>

    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

    <form [formGroup]="locationForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="farm_name">Farm/Site Name *</label>
        <input type="text" id="farm_name" formControlName="farm_name" placeholder="e.g. North Pasture">
      </div>

      <div class="form-group">
        <label for="address_line">Address Line 1 *</label>
        <input type="text" id="address_line" formControlName="address_line" placeholder="e.g. 123 Country Lane">
      </div>

      <div class="form-row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label for="town">Town / City *</label>
          <input type="text" id="town" formControlName="town" placeholder="e.g. Omagh">
        </div>
        <div class="form-group" style="flex: 1;">
          <label for="county">County *</label>
          <input type="text" id="county" formControlName="county" placeholder="e.g. Tyrone">
        </div>
      </div>

      <div class="form-row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label for="postcode">Postcode / Zip *</label>
          <input type="text" id="postcode" formControlName="postcode" placeholder="e.g. BT78 1AA">
        </div>
        <div class="form-group" style="flex: 1;">
          <label for="last_inspection_date">Last Inspection Date</label>
          <input type="date" id="last_inspection_date" formControlName="last_inspection_date">
        </div>
      </div>

      <div class="button-group" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button type="button" class="btn-cancel" routerLink="/locations" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: 1px solid #ccc; background: transparent; cursor: pointer;">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="locationForm.invalid || isSubmitting" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: none; background: #0d6efd; color: white; font-weight: bold; cursor: pointer;">
          {{ isSubmitting ? 'Saving...' : 'Save Location' }}
        </button>
      </div>

    </form>
  </div>
</div>
