<div class="page-container">
  <div class="form-card">
    <h2>Edit User</h2>
    <p>Update access roles, email addresses, or reset passwords.</p>

    <div *ngIf="isLoading" class="alert info">Loading user details...</div>
    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

    <form *ngIf="!isLoading" [formGroup]="userForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" formControlName="username">
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" formControlName="email">
      </div>

      <div class="form-group">
        <label for="role">Role / Permissions *</label>
        <select id="role" formControlName="role">
          <option value="" disabled>-- Select a Role --</option>
          <option *ngFor="let role of availableRoles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <div class="form-group" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed #ccc;">
        <label for="password">Reset Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter new password (optional)">
        <small style="color: #6c757d; display: block; margin-top: 0.25rem;">
          Leave this blank to keep the user's current password.
        </small>
      </div>

      <div class="button-group" style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button type="button" class="btn-cancel" routerLink="/users" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: 1px solid #ccc; background: transparent; cursor: pointer;">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="userForm.invalid || isSubmitting" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: none; background: #ffc107; color: black; font-weight: bold; cursor: pointer;">
          {{ isSubmitting ? 'Updating...' : 'Update User' }}
        </button>
      </div>

    </form>
  </div>
</div>
