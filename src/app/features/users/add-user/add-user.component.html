<div class="page-container">
  <div class="form-card">
    <h2>Add New User</h2>
    <p>Create a new account and assign an access role.</p>

    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" formControlName="username" placeholder="Enter a unique username">
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" formControlName="email" placeholder="e.g. user@farm.com">
      </div>

      <div class="form-group">
        <label for="role">Role / Permissions *</label>
        <select id="role" formControlName="role">
          <option value="" disabled>-- Select a Role --</option>
          <option *ngFor="let role of availableRoles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Temporary Password *</label>
        <input type="password" id="password" formControlName="password" placeholder="Must be at least 8 characters">
      </div>

      <div class="button-group" style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button type="button" class="btn-cancel" (click)="cancel()" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: 1px solid #777; background: transparent; color: inherit; cursor: pointer;">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="userForm.invalid || isSubmitting" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: none; background: #0d6efd; color: white; font-weight: bold; cursor: pointer;">
          {{ isSubmitting ? 'Saving...' : 'Create User' }}
        </button>
      </div>

    </form>
  </div>
</div>
