<div class="page-container">
  <div class="form-card">
    <h2>Edit Breeding Record</h2>
    <p>Update the service date or record the pregnancy outcome.</p>

    <div *ngIf="isLoading" class="alert info">Loading record details...</div>
    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

    <form *ngIf="!isLoading" [formGroup]="breedingForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="cow_id">Female Cow (Cannot be changed)</label>
        <select id="cow_id" formControlName="cow_id">
          <option *ngFor="let cow of femaleCows" [value]="cow.cow_id">
            Tag: {{ cow.tag_number }} ({{ cow.breed }})
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="service_date">Service Date *</label>
        <input type="date" id="service_date" formControlName="service_date">
      </div>

      <div class="form-group">
        <label for="outcome">Outcome / Status *</label>
        <select id="outcome" formControlName="outcome">
          <option value="pending">Pending</option>
          <option value="pregnant">Pregnant</option>
          <option value="not_pregnant">Not Pregnant</option>
          <option value="calved">Calved</option>
          <option value="aborted">Aborted</option>
        </select>
      </div>

      <div class="button-group" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button type="button" class="btn-cancel" routerLink="/breeding-records" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: 1px solid #ccc; background: transparent; cursor: pointer;">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="breedingForm.invalid || isSubmitting" style="padding: 0.75rem 1.5rem; border-radius: 4px; border: none; background: #ffc107; color: black; font-weight: bold; cursor: pointer;">
          {{ isSubmitting ? 'Updating...' : 'Update Record' }}
        </button>
      </div>

    </form>
  </div>
</div>
